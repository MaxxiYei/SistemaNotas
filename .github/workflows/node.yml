name: Node.js CI
on:
  push:
    branches:
         main
jobs:
  build:
    runs-on: ubuntu-lastest
    steps:
      - name: Cloner repositorio
        uses: actions/checkout@v4
      - name: Instalar node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Ejecutar archivo
        run: node index.js